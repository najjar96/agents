name: Daily Research Agent
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # THIS SECTION IS THE FIX:
    defaults:
      run:
        working-directory: ./multiAgent 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Agent
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENTS_CV: ${{ secrets.RECIPIENTS_CV }}
          RECIPIENTS_RAG: ${{ secrets.RECIPIENTS_RAG }}
          RECIPIENTS_UNITY: ${{ secrets.RECIPIENTS_UNITY }}
          URL_3D: "https://arxiv.org/list/cs.GR/recent"
          URL_CV: "https://arxiv.org/list/cs.CV/recent"
          URL_RAG: "https://arxiv.org/list/cs.CL/recent"
        run: python main.py
